<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID GENERATOR ULTIMATE</title>
</head>
<body>
    <h1>UUID GENERATOR ULTIMATE!!!!!!!!!!!!</h3>
    <br>
    <h3>Select UUID versions</h3>
    <select id="version">
        <option value="v1">UUID v1</option>
        <option value="v4" selected>UUID v4</option>
        <option value="v7">UUID v7</option>
    </select>
    <button onclick="generateUUID()">Generate</button>
    <p id="output">output Will be here!</p>
    <button onclick="copyUUID()">Copy</button>
</body>
<script>
    function generateUUID() {
    const v = document.getElementById("version").value;
    let uuid = "";

    if (v === "v4") uuid = uuidv4(); 
    else if (v === "v7") uuid = uuidv7();
    else if (v === "v1") uuid = uuidv1();

    document.getElementById("output").textContent = uuid;
    }

    function uuidv4() {
    const bytes = crypto.getRandomValues(new Uint8Array(16));

    bytes[6] = (bytes[6] & 0x0f) | 0x40;
    bytes[8] = (bytes[8] & 0x3f) | 0x80;

    const uuid = [...bytes].map((b, i) => {
        return (b.toString(16).padStart(2, '0')) +
            ([3,5,7,9].includes(i) ? '-' : '');
    }).join('');

    document.getElementById("output").textContent = uuid;

    return uuid;
    }

    function uuidv7() {
    const time = Date.now().toString(16).padStart(12, "0");

    const rand = crypto.getRandomValues(new Uint8Array(10));
    const randHex = [...rand].map(b => b.toString(16).padStart(2, "0")).join("");

    return `${time.slice(0,8)}-${time.slice(8,12)}-7${randHex.slice(0,3)}-8${randHex.slice(3,6)}-${randHex.slice(6,18)}`;
    }
    function uuidv1() {
    const time = Date.now().toString(16).padStart(12, "0");

    const rand = crypto.getRandomValues(new Uint8Array(10));
    const randHex = [...rand].map(b => b.toString(16).padStart(2, "0")).join("");

    return `${time.slice(0,8)}-${time.slice(8,12)}-1${randHex.slice(0,3)}-8${randHex.slice(3,6)}-${randHex.slice(6,18)}`;
    }
    function copyUUID() {
    const text = document.getElementById("output").textContent;

    if (text == "output Will be here!") {
        alert("uhh.. you should generate it first buddy..");
        return;
    }

    navigator.clipboard.writeText(text)
        .then(() => alert("Copied!"))
        .catch(() => alert("Failed to copy.. BUT HOW!???"));
    }
</script>
</html>
