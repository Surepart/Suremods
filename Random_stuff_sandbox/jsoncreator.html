<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON CREATOR ULTIMATE!</title>
</head>
<body>
    <h3>JSON Creator</h3>

    <input id="key" placeholder="Key">
    <input id="value" placeholder="Value">
    <button onclick="addPair()">Add</button>
    <select id="type">
        <option value="auto">Auto</option>
        <option value="string">String</option>
        <option value="number">Number</option>
        <option value="boolean">Boolean</option>
        <option value="array">Array</option>
        <option value="object">Object</option>
    </select>
    

    <br><br>

    <button onclick="generateJSON()">Generate JSON</button>
    <br>
    <h4>Current Data</h4>
    <button onclick="goBack()">Back</button>
    <ul id="currentList"></ul>
    <br>
    <h4>Generated Json:</h1>
    <pre id="output"></pre>

    <input id="filename" placeholder="File name (default: data)">
    <br><br>
    <button onclick="downloadJSON()">Download JSON</button>
</body>
<script>
    let root = {};
    let current = root;
    let stack = [];

    
    function renderCurrent() {
        const list = document.getElementById("currentList");
        list.innerHTML = "";

        // 🟢 ARRAY MODE
        if (Array.isArray(current)) {
            current.forEach((item, index) => {
                const li = document.createElement("li");

                li.textContent = JSON.stringify(item);

                const arrayRef = current;

                // remove
                const removeBtn = document.createElement("button");
                removeBtn.textContent = "Remove";
                removeBtn.onclick = () => {
                    arrayRef.splice(index, 1);
                    renderCurrent();
                };

                li.appendChild(removeBtn);

                // select
                if (item !== null && typeof item === "object") {
                    const selectBtn = document.createElement("button");
                    selectBtn.textContent = "Select";
                    selectBtn.onclick = () => {
                        stack.push({
                            parent: current,
                            key: index
                        });

                        current = item;
                        renderCurrent();
                    };

                    li.appendChild(selectBtn);
                }

                list.appendChild(li);
            });
        }

        // 🔵 OBJECT MODE
        else {
            for (let key in current) {
                const li = document.createElement("li");

                li.textContent = `${key}: ${JSON.stringify(current[key])}`;

                const removeBtn = document.createElement("button");
                removeBtn.textContent = "Remove";
                removeBtn.onclick = () => {
                    delete current[key];
                    renderCurrent();
                };

                li.appendChild(removeBtn);

                if (current[key] !== null && typeof current[key] === "object") {
                    const selectBtn = document.createElement("button");
                    selectBtn.textContent = "Select";
                    selectBtn.onclick = () => {
                        stack.push({
                            parent: current,
                            key: key
                        });

                        current = current[key];
                        renderCurrent();
                    };

                    li.appendChild(selectBtn);
                }

                list.appendChild(li);
            }
        }
    }
    function addPair() {
        let key = document.getElementById("key").value;
        let value = document.getElementById("value").value;
        const type = document.getElementById("type").value;

        // 🧠 If current is ARRAY → ignore key
        if (Array.isArray(current)) {

            if (type === "auto") {
                if (value.includes(",")) {
                    value = value.split(",").map(v => v.trim());
                }
                else if (!isNaN(value) && value !== "") value = Number(value);
                else if (value === "true") value = true;
                else if (value === "false") value = false;
            }
            else if (type === "number") value = Number(value);
            else if (type === "boolean") value = value === "true";
            else if (type === "array") value = [];
            else if (type === "object") value = {};

            current.push(value); // 🔥 THIS LINE FIXES EVERYTHING
        }

        // 🧠 If current is OBJECT → use key
        else {
            if (!key) return;

            if (type === "auto") {
                if (value.includes(",")) {
                    value = value.split(",").map(v => v.trim());
                }
                else if (!isNaN(value) && value !== "") value = Number(value);
                else if (value === "true") value = true;
                else if (value === "false") value = false;
            }
            else if (type === "number") value = Number(value);
            else if (type === "boolean") value = value === "true";
            else if (type === "array") value = [];
            else if (type === "object") value = {};

            current[key] = value;
        }

        renderCurrent();

        document.getElementById("key").value = "";
        document.getElementById("value").value = "";
    }
    function goBack() {
        if (stack.length === 0) return;

        const last = stack.pop();
        current = last.parent;

        renderCurrent();
